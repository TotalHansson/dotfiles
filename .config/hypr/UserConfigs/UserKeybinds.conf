# /* ---- 💫 https://github.com/JaKooLit 💫 ---- */  #
# This is where you put your own keybinds. Be Mindful to check as well ~/.config/hypr/configs/Keybinds.conf to avoid conflict
# if you think I should replace the Pre-defined Keybinds in ~/.config/hypr/configs/Keybinds.conf , submit an issue or let me know in DC and present me a valid reason as to why, such as conflicting with global shortcuts, etc etc

# See https://wiki.hyprland.org/Configuring/Keywords/ for more settings and variables
# See also Laptops.conf for laptops keybinds 

# /* ---- ✴️ Variables ✴️ ---- */  #
$mainMod = SUPER
$scriptsDir = $HOME/.config/hypr/scripts
$UserScripts = $HOME/.config/hypr/UserScripts
$UserConfigs = $HOME/.config/hypr/UserConfigs

#  IMPORTANT: If you want to remap and existing keybind you MUST unbindd it first 

# The bindings are CASE SENSITIVE. We suggest you copy the exisitng binding here
#  Then change `bindd` to `unbind`

# E.g. 
# unbind = $mainMod, Return, Open terminal, exec, $term
# bindd = $mainMod, Return, Open terminal, exec, ghostty 
#
# unbind = $mainMod, E, file manager, exec, $files
# bindd = $mainMod, T, file manager, exec, $files

# If you are ADDING a bindd, make sure you include the description 
# Other the keybind search menu might not show it properly 

# E.g.
# bindd = $mainMod, Z, My z app, exec APPNAME


# Unbind default JaKooLit binds
unbind = $mainMod, H, help / cheat sheet, exec, $scriptsDir/KeyHints.sh
unbind = $mainMod SHIFT, K, search keybinds, exec, $scriptsDir/KeyBinds.sh
unbind = $mainMod CTRL, F9, move workspace to left monitor, movecurrentworkspacetomonitor, l
unbind = $mainMod CTRL, F10, move workspace to right monitor, movecurrentworkspacetomonitor, r
unbind = $mainMod CTRL, F11, move workspace to up monitor, movecurrentworkspacetomonitor, u
unbind = $mainMod CTRL, F12, move workspace to down monitor, movecurrentworkspacetomonitor, d
unbind = $mainMod SHIFT, F, fullscreen, fullscreen
unbind = $mainMod CTRL, F, maximize window, fullscreen, 1
unbind = $mainMod, SPACE, Float current window, togglefloating,
unbind = $mainMod ALT, SPACE, Float all windows, exec, hyprctl dispatch workspaceopt allfloat
unbind = $mainMod ALT, R, refresh bar and menus, exec, $scriptsDir/Refresh.sh
unbind = $mainMod CTRL, R, rofi theme selector, exec, $scriptsDir/RofiThemeSelector.sh
unbind = $mainMod CTRL SHIFT, R, rofi theme selector (modified), exec, pkill rofi || true && $scriptsDir/RofiThemeSelector-modified.sh
unbind = ALT_L, SHIFT_L, switch keyboard layout globally, exec, $scriptsDir/KeyboardLayout.sh switch
unbind = SHIFT_L, ALT_L, switch keyboard layout per-window, exec, $scriptsDir/Tak0-Per-Window-Switch.sh
unbind = CTRL ALT, L, lock screen, exec, $scriptsDir/LockScreen.sh
unbind = CTRL ALT, P, powermenu, exec, $scriptsDir/Wlogout.sh
unbind = $mainMod SHIFT, U, move to special workspace, movetoworkspace, special
unbind = $mainMod, U, toggle special workspace, togglespecialworkspace,
unbind = $mainMod, code:10, workspace 1, workspace, 1 # NOTE: code:10 = key 1
unbind = $mainMod, code:11, workspace 2, workspace, 2 # NOTE: code:11 = key 2
unbind = $mainMod, code:12, workspace 3, workspace, 3 # NOTE: code:12 = key 3
unbind = $mainMod, code:13, workspace 4, workspace, 4 # NOTE: code:13 = key 4
unbind = $mainMod, code:14, workspace 5, workspace, 5 # NOTE: code:14 = key 5
unbind = $mainMod, code:15, workspace 6, workspace, 6 # NOTE: code:15 = key 6
unbind = $mainMod, code:16, workspace 7, workspace, 7 # NOTE: code:16 = key 7
unbind = $mainMod, code:17, workspace 8, workspace, 8 # NOTE: code:17 = key 8
unbind = $mainMod, code:18, workspace 9, workspace, 9 # NOTE: code:18 = key 9
unbind = $mainMod, code:19, workspace 10, workspace, 10 # NOTE: code:19 = key 0


# Move focus
bindd = $mainMod, H, focus left, exec, hyprctl --batch "dispatch movefocus l ; dispatch movecursortocorner 2"
bindd = $mainMod, J, focus right, exec, hyprctl --batch "dispatch movefocus d ; dispatch movecursortocorner 2"
bindd = $mainMod, K, focus up, exec, hyprctl --batch "dispatch movefocus u ; dispatch movecursortocorner 2"
bindd = $mainMod, L, focus down, exec, hyprctl --batch "dispatch movefocus r ; dispatch movecursortocorner 2"

# Switch workspaces with mainMod + [0-9]
bindd = $mainMod, code:10, workspace 1, exec, $UserScripts/Workspace.sh 1
bindd = $mainMod, code:11, workspace 2, exec, $UserScripts/Workspace.sh 2
bindd = $mainMod, code:12, workspace 3, exec, $UserScripts/Workspace.sh 3
bindd = $mainMod, code:13, workspace 4, exec, $UserScripts/Workspace.sh 4
bindd = $mainMod, code:14, workspace 5, exec, $UserScripts/Workspace.sh 5
bindd = $mainMod, code:15, workspace 6, exec, $UserScripts/Workspace.sh 6
bindd = $mainMod, code:16, workspace 7, exec, $UserScripts/Workspace.sh 7
bindd = $mainMod, code:17, workspace 8, exec, $UserScripts/Workspace.sh 8
bindd = $mainMod, code:18, workspace 9, exec, $UserScripts/Workspace.sh 9
bindd = $mainMod, code:19, workspace 10, exec, $UserScripts/Workspace.sh 10

# Move windows
bindd = $mainMod SHIFT, H, move window left, movewindow, l
bindd = $mainMod SHIFT, L, move window right, movewindow, r
bindd = $mainMod SHIFT, K, move window up, movewindow, u
bindd = $mainMod SHIFT, J, move window down, movewindow, d
bindd = $mainMod ALT, H, swap window left, swapwindow, l
bindd = $mainMod ALT, L, swap window right, swapwindow, r
bindd = $mainMod ALT, K, swap window up, swapwindow, u
bindd = $mainMod ALT, J, swap window down, swapwindow, d

# Move workspace
bindd = $mainMod CTRL, H, move workspace to left monitor, movecurrentworkspacetomonitor, l
bindd = $mainMod CTRL, L, move workspace to right monitor, movecurrentworkspacetomonitor, r
bindd = $mainMod CTRL, K, move workspace to up monitor, movecurrentworkspacetomonitor, u
bindd = $mainMod CTRL, J, move workspace to down monitor, movecurrentworkspacetomonitor, d

# Toggle fullscreen
bindd = $mainMod, F, maximize window, fullscreen, 1
bindd = $mainMod SHIFT, F, Float current window, togglefloating,

# Manually set next split direction
bindd = $mainMod, backslash, Split next horizontally, layoutmsg, preselect r
bindd = $mainMod, minus, Split next vertically, layoutmsg, preselect d


bindd = $mainMod SHIFT, R, refresh bar and menus, exec, $scriptsDir/Refresh.sh
bindld = $mainMod, SPACE, switch keyboard layout globally, exec, $scriptsDir/KeyboardLayout.sh switch
bindd = CTRL SHIFT, L, lock screen, exec, $scriptsDir/LockScreen.sh
bindd = CTRL SHIFT, P, powermenu, exec, $scriptsDir/Wlogout.sh

# Resize window submap
bind = $mainMod, R, submap, resize
submap = resize
binde = , L, resizeactive, 20 0
binde = , H, resizeactive, -20 0
binde = , K, resizeactive, 0 -20
binde = , J, resizeactive, 0 20
binde = , escape, submap, reset
binde = $mainMod, R, submap, reset
submap = reset


# For passthrough keyboard into a VM
# bind = $mainMod ALT, P, submap, passthru
#submap = passthru
# to unbind
#bind = $mainMod ALT, P, submap, reset
#submap = reset
